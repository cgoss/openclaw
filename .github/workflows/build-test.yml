name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsgo

      - name: Lint
        run: |
          pnpm lint
          pnpm lint:tmp:no-random-messaging
          pnpm lint:tmp:channel-agnostic-boundaries
          pnpm lint:tmp:no-raw-channel-fetch
          pnpm lint:agent:ingress-owner
          pnpm lint:plugins:no-register-http-handler
          pnpm lint:plugins:no-monolithic-plugin-sdk-entry-imports
          pnpm lint:webhook:no-low-level-body-read
          pnpm lint:auth:no-pairing-store-group
          pnpm lint:auth:pairing-account-scope

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-dist
          path: dist/
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish @frankenclaw/openclaw --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FRANKENCLAW_NPM }}

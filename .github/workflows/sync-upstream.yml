name: Sync Upstream

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch upstream main

      - name: Check if sync needed
        id: check
        run: |
          COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Upstream is $COUNT commits ahead"

      - name: Create sync branch and merge
        if: steps.check.outputs.count != '0'
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"

          if git merge upstream/main --no-edit; then
            echo "conflicts=false" >> $GITHUB_OUTPUT
          else
            echo "conflicts=true" >> $GITHUB_OUTPUT
            # Commit conflicted state so the PR shows the diff
            git add -A
            git commit -m "sync: upstream merge — conflicts need resolution"
          fi

      - name: Setup pnpm
        if: steps.check.outputs.count != '0' && steps.merge.outputs.conflicts == 'false'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.check.outputs.count != '0' && steps.merge.outputs.conflicts == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check.outputs.count != '0' && steps.merge.outputs.conflicts == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.count != '0' && steps.merge.outputs.conflicts == 'false'
        id: build
        run: |
          if pnpm build; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge to main and clean up
        if: steps.check.outputs.count != '0' && steps.merge.outputs.conflicts == 'false' && steps.build.outputs.success == 'true'
        run: |
          BRANCH="${{ steps.merge.outputs.branch }}"
          git checkout main
          git merge "$BRANCH" --ff-only
          git push origin main
          git branch -d "$BRANCH"
          echo "Sync complete — $(git rev-parse HEAD)"

      - name: Push sync branch on failure
        if: steps.check.outputs.count != '0' && (steps.merge.outputs.conflicts == 'true' || steps.build.outputs.success == 'false')
        run: git push origin "${{ steps.merge.outputs.branch }}"

      - name: Open PR on failure
        if: steps.check.outputs.count != '0' && (steps.merge.outputs.conflicts == 'true' || steps.build.outputs.success == 'false')
        run: |
          BRANCH="${{ steps.merge.outputs.branch }}"
          if [ "${{ steps.merge.outputs.conflicts }}" = "true" ]; then
            REASON="merge conflicts"
          else
            REASON="build failure"
          fi

          gh pr create \
            --title "sync: upstream merge requires manual intervention ($REASON)" \
            --body "Automated upstream sync from [openclaw/openclaw](https://github.com/openclaw/openclaw) failed due to **$REASON**. Please resolve and merge manually." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
